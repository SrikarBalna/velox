name: Velox CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test Execution Engine (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [C, CPP, Java, Node, Python, TS, CSharp]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install TypeScript
        run: sudo npm install -g typescript

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Backend End-to-End Tests for ${{ matrix.language }}
        working-directory: backend
        run: |
          go mod tidy
          go test -v -race ./processSubmission -run TestProcessSubmission_${{ matrix.language }}$
